version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ggchecks
      POSTGRES_USER: ggchecks
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  ggchecks:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    environment:
      - DATABASE_URL=postgres://ggchecks:secret@postgres:5432/ggchecks
      - PROXY_USERNAME=${PROXY_USERNAME}
      - PROXY_PASSWORD=${PROXY_PASSWORD}
    env_file:
      - .env.local
    volumes:
      # Map the screenshots directory so they aren't lost on container rebuild
      - ./tmp_screenshots:/tmp/ggchecks-screenshots
    restart: unless-stopped

volumes:
  pgdata:
